x-airflow-common: &airflow-common
  image: apache/airflow:2.10.2
  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'true'
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-postgres/airflow
    AIRFLOW__WEBSERVER__EXPOSE_CONFIG: 'true'
    AIRFLOW_UID: 50000
    _PIP_ADDITIONAL_REQUIREMENTS: '-r /opt/airflow/requirements.txt'
    MBTA_API_URL: https://api-v3.mbta.com/vehicles
    MBTA_TARGET_DB_HOST: postgres-1
    MBTA_TARGET_DB_PORT: '5432'
    MBTA_TARGET_DB_NAME: postgres
    MBTA_TARGET_DB_USER: postgres
    MBTA_TARGET_DB_PASSWORD: ${POSTGRES_PASSWORD}
  volumes:
    - ./dags:/opt/airflow/dags
    - ./logs:/opt/airflow/logs
    - ./plugins:/opt/airflow/plugins
    - ./requirements.txt:/opt/airflow/requirements.txt
  user: '${AIRFLOW_UID:-50000}:0'
  depends_on:
    airflow-postgres:
      condition: service_healthy
  networks:
    - airflow-network
    - dw-network

services:
  airflow-postgres:
    image: postgres:15
    container_name: airflow-postgres
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U airflow -d airflow']
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - airflow_pgdata:/var/lib/postgresql/data
    networks:
      - airflow-network

  airflow-init:
    <<: *airflow-common
    container_name: airflow-init
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate && \
        airflow users create \
          --role Admin \
          --username admin \
          --password admin \
          --firstname Airflow \
          --lastname Admin \
          --email admin@example.com
    restart: 'no'

  airflow-webserver:
    <<: *airflow-common
    container_name: airflow-webserver
    command: webserver
    ports:
      - '8080:8080'
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  airflow-scheduler:
    <<: *airflow-common
    container_name: airflow-scheduler
    command: scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully

volumes:
  airflow_pgdata:

networks:
  airflow-network:
    driver: bridge
  dw-network:
    external: true
